					<main>
						<h1 class="font-gold">API KEY CONFIGURATION</h1>
						<h2>API密钥配置</h2>
						
						<div class="form-container">
							<div class="form-group">
								<label>API Key</label>
								<input type="text" id="apiKey" placeholder="请输入API Key">
							</div>
							<div class="form-group">
								<label>API Pass</label>
								<input type="password" id="apiPass" placeholder="请输入API Pass">
							</div>
							<div class="form-group">
								<label>API Endpoint</label>
								<input type="text" id="apiEndpoint" value="https://fimtale.com/api/v1" readonly>
							</div>
							<button class="submit-btn" onclick="saveAPIKey()">保存配置</button>
							<button class="cancel-btn" onclick="window.location.href='classic-standard.html'">取消</button>
							<button class="test-btn" onclick="testAPIConnection()">测试连接</button>
						</div>
						
						<div class="status-panel">
							<h3>当前状态</h3>
							<p><strong>API Key:</strong> <span id="currentKey">未配置</span></p>
							<p><strong>API Pass:</strong> <span id="currentPass">未配置</span></p>
							<p><strong>连接:</strong> <span id="connectionStatus">未测试</span></p>
						</div>
					</main>
				</div>
			</div>
		</section>

	<script type="text/javascript" src="assets/novel-api.js?v=20260418"></script>
	<script>
		function saveAPIKey() {
			var apiKey = document.getElementById('apiKey').value.trim();
			var apiPass = document.getElementById('apiPass').value.trim();
			
			if (!apiKey) { alert('请输入API Key'); return; }
			if (!apiPass) { alert('请输入API Pass'); return; }
			
			NovelAPI.saveCredentials(apiKey, apiPass);
			
			document.getElementById('currentKey').textContent = '已配置';
			document.getElementById('currentPass').textContent = '已配置';
			alert('API配置保存成功!');
		}
		
		function clearAPIKey() {
			NovelAPI.clearCredentials();
			
			document.getElementById('apiKey').value = '';
			document.getElementById('apiPass').value = '';
			document.getElementById('currentKey').textContent = '未配置';
			document.getElementById('currentPass').textContent = '未配置';
			document.getElementById('connectionStatus').textContent = '未测试';
			alert('API配置已清除');
		}
		
		async function testAPIConnection() {
			var statusElement = document.getElementById('connectionStatus');
			statusElement.textContent = '测试中...';
			
			var apiKey = document.getElementById('apiKey').value.trim();
			var apiPass = document.getElementById('apiPass').value.trim();
			
			if (apiKey && apiPass) {
				NovelAPI.saveCredentials(apiKey, apiPass);
			}
			
			if (!NovelAPI.hasCredentials()) {
				statusElement.textContent = '未配置';
				alert('请先配置API Key和API Pass');
				return;
			}
			
			try {
				var result = await NovelAPI.testConnection();
				
				if (result.success) {
					statusElement.textContent = '已连接';
					alert('API连接测试成功!\n\n测试URL: ' + NovelAPI.API_ENDPOINT + '/t/76448\n\n服务器响应: ' + JSON.stringify(result.data).substring(0, 500) + '...');
				} else {
					statusElement.textContent = '连接失败';
					alert('API连接测试失败: ' + result.error);
				}
			} catch (error) {
				statusElement.textContent = '连接失败';
				alert('API连接测试失败: ' + error.message);
			}
		}
		
		/**
		 * 初始化动态数据更新
		 */
		function initDynamicData() {
			updateTime();
			updateDeviceInfo();
			updateNetworkInfo();
			updateScreenInfo();
			updateBatteryInfo();
			updateMemoryInfo();
			updateUptime();
			updateLanguage();
			updateUserAgent();
			
			setInterval(updateTime, 1000);
			setInterval(updateNetworkInfo, 10000);
			setInterval(updateBatteryInfo, 30000);
			setInterval(updateMemoryInfo, 30000);
			setInterval(updateUptime, 1000);
			setInterval(updateScreenInfo, 5000);
			
			window.addEventListener('resize', updateScreenInfo);
			window.addEventListener('online', updateNetworkInfo);
			window.addEventListener('offline', updateNetworkInfo);
		}
		
		function updateTime() {
			var now = new Date();
			var h = String(now.getHours()).padStart(2, '0');
			var m = String(now.getMinutes()).padStart(2, '0');
			var s = String(now.getSeconds()).padStart(2, '0');
			document.getElementById('api-time').textContent = h + ':' + m + ':' + s;
			
			var y = now.getFullYear();
			var mo = String(now.getMonth() + 1).padStart(2, '0');
			var d = String(now.getDate()).padStart(2, '0');
			document.getElementById('api-date').textContent = y + '/' + mo + '/' + d;
		}
		
		function updateDeviceInfo() {
			var dev = document.getElementById('api-dev');
			var ua = navigator.userAgent;
			if (/iPad/.test(ua)) dev.textContent = 'iPad';
			else if (/iPhone/.test(ua)) dev.textContent = 'iPhone';
			else if (/Android/.test(ua)) dev.textContent = 'Android';
			else if (/Windows/.test(ua)) dev.textContent = 'WinPC';
			else if (/Macintosh/.test(ua)) dev.textContent = 'Mac';
			else if (/Linux/.test(ua)) dev.textContent = 'Linux';
			else dev.textContent = 'N/A';
		}
		
		function updateNetworkInfo() {
			var net = document.getElementById('api-net');
			var sys = document.getElementById('api-sys');
			
			if (navigator.onLine) {
				sys.textContent = 'ONLINE';
				sys.style.color = '#6c6';
				if (navigator.connection) {
					var conn = navigator.connection;
					var type = conn.effectiveType || 'unknown';
					var downlink = conn.downlink ? conn.downlink.toFixed(1) : '?';
					net.textContent = type.toUpperCase() + ' ' + downlink + 'Mb';
				} else {
					net.textContent = 'ONLINE';
				}
			} else {
				sys.textContent = 'OFFLINE';
				sys.style.color = '#c66';
				net.textContent = 'OFFLINE';
			}
		}
		
		function updateScreenInfo() {
			var scr = document.getElementById('api-scr');
			var w = window.innerWidth;
			var h = window.innerHeight;
			var dpr = window.devicePixelRatio || 1;
			scr.textContent = w + 'x' + h + ' ' + dpr.toFixed(1) + 'x';
		}
		
		function updateBatteryInfo() {
			var batt = document.getElementById('api-batt');
			if ('getBattery' in navigator) {
				navigator.getBattery().then(function(battery) {
					var level = Math.round(battery.level * 100);
					var charging = battery.charging ? '⚡' : '';
					batt.textContent = level + '%' + charging;
					if (level <= 20) batt.style.color = '#c66';
					else if (level <= 50) batt.style.color = '#f96';
					else batt.style.color = '';
				}).catch(function() {
					batt.textContent = 'N/A';
				});
			} else {
				batt.textContent = 'N/A';
			}
		}
		
		function updateMemoryInfo() {
			var mem = document.getElementById('api-mem');
			if (performance.memory) {
				var usedMB = Math.round(performance.memory.usedJSHeapSize / 1048576);
				var totalMB = Math.round(performance.memory.jsHeapSizeLimit / 1048576);
				mem.textContent = usedMB + 'MB/' + totalMB + 'MB';
			} else {
				mem.textContent = 'N/A';
			}
		}
		
		var pageLoadTime = Date.now();
		function updateUptime() {
			var uptime = document.getElementById('api-uptime');
			var elapsed = Math.floor((Date.now() - pageLoadTime) / 1000);
			var hours = Math.floor(elapsed / 3600);
			var minutes = Math.floor((elapsed % 3600) / 60);
			var seconds = elapsed % 60;
			uptime.textContent = String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
		}
		
		function updateLanguage() {
			var lang = document.getElementById('api-lang');
			lang.textContent = navigator.language || 'N/A';
		}
		
		function updateUserAgent() {
			var ua = document.getElementById('api-ua');
			var browser = 'N/A';
			var userAgent = navigator.userAgent;
			if (/Chrome/.test(userAgent) && !/Edg/.test(userAgent)) browser = 'Chrome';
			else if (/Firefox/.test(userAgent)) browser = 'Firefox';
			else if (/Safari/.test(userAgent) && !/Chrome/.test(userAgent)) browser = 'Safari';
			else if (/Edg/.test(userAgent)) browser = 'Edge';
			ua.textContent = browser;
		}
		
		document.addEventListener('DOMContentLoaded', function() {
			var creds = NovelAPI.getStoredCredentials();
			
			if (creds.apiKey) { 
				document.getElementById('apiKey').value = creds.apiKey; 
				document.getElementById('currentKey').textContent = '已配置'; 
			}
			if (creds.apiPass) { 
				document.getElementById('apiPass').value = creds.apiPass; 
				document.getElementById('currentPass').textContent = '已配置'; 
			}
			
			initDynamicData();
		});
	</script>
